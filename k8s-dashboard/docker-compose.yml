version: '3.8'

services:
  backend:
    build: ./backend
    container_name: k8s-dashboard-backend
    ports:
      - "8000:8000"
    environment:
      # Kubernetes connection settings
      - K8S_IN_CLUSTER=false              # Set to 'true' if running inside K8s cluster
      - K8S_CONFIG_PATH=/root/.kube/config # Path to kubeconfig in container
      
      # Application settings
      - DEBUG=true
      - LOG_LEVEL=INFO
    volumes:
      # Mount kubeconfig for cluster access
      # Linux/Mac: ~/.kube/config mounts properly
      # Windows with WSL: WSL automatically handles path conversion
      # Windows with Docker Desktop: Use Windows path or WSL mount
      - ~/.kube:/root/.kube:ro
    networks:
      - k8s-dashboard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: k8s-dashboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - k8s-dashboard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  k8s-dashboard:
    driver: bridge

# To use with a real Kubernetes cluster:
# 1. Ensure kubectl is configured with your cluster: kubectl cluster-info
# 2. docker-compose will mount ~/.kube/config to the backend container
# 3. Backend will auto-detect and connect to your cluster
# 4. Real cluster data will appear in the dashboard
