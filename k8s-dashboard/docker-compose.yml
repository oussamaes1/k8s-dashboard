services:
  backend:
    build: ./backend
    container_name: k8s-dashboard-backend
    ports:
      - "8000:8000"
    environment:
      # Kubernetes
      - K8S_IN_CLUSTER=false
      - K8S_CONFIG_PATH=/root/.kube/config
      # App
      - DEBUG=false
      - LOG_LEVEL=INFO
      # Auth / Security – override defaults for Docker deployment
      - SECRET_KEY=${SECRET_KEY:-change-me-use-a-strong-random-key}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
      - DATABASE_URL=sqlite:///./data/k8s_dashboard.db
      # CORS – allow the frontend container
      - CORS_ORIGINS=http://localhost:3000,http://localhost,http://127.0.0.1:3000,http://127.0.0.1
    volumes:
      - ${USERPROFILE}/.kube:/root/.kube:ro
      - backend-data:/app/data
    networks:
      - k8s-dashboard
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: k8s-dashboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - k8s-dashboard
    restart: unless-stopped

volumes:
  backend-data:

networks:
  k8s-dashboard:
    driver: bridge
