# Kubernetes Deployment for Bean & Bloom Coffee Shop
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bean-bloom
  namespace: default
  labels:
    app: bean-bloom
    version: "1.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bean-bloom
  template:
    metadata:
      labels:
        app: bean-bloom
    spec:
      containers:
      - name: bean-bloom
        # Using local image (built with docker build)
        image: bean-bloom:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 80
          name: http
        
        # Resource limits (will show in K8s Dashboard metrics)
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---

# Service to expose the application
apiVersion: v1
kind: Service
metadata:
  name: bean-bloom-service
  namespace: default
  labels:
    app: bean-bloom
spec:
  type: LoadBalancer
  selector:
    app: bean-bloom
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    name: http
